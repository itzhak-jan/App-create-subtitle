name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk-bundle \
            /opt/ghc /usr/local/.ghcup || true

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      # ── Patch node_modules for known Kotlin version bugs ──────────────
      #
      # Kotlin 2.0.21 has a "source must not be null" bug when java-gradle-plugin
      # is used in an included build with Gradle 8.8+. Fixed in Kotlin 2.1.0+.
      # We upgrade all occurrences to 2.1.20 to match the project's kotlinVersion.
      #
      - name: Patch Kotlin versions in Gradle plugins (2.0.21 -> 2.1.20)
        run: |
          # @react-native/gradle-plugin
          TOML="node_modules/@react-native/gradle-plugin/gradle/libs.versions.toml"
          if [ -f "$TOML" ]; then
            sed -i 's/^kotlin = "2.0.21"/kotlin = "2.1.20"/' "$TOML"
            find node_modules/@react-native/gradle-plugin -name "build.gradle.kts" \
              -exec sed -i '/^kotlin { jvmToolchain(17) }$/d' {} \;
            echo "Patched @react-native/gradle-plugin"
          fi

          # expo-updates-gradle-plugin
          FILE="node_modules/expo-updates/expo-updates-gradle-plugin/build.gradle.kts"
          [ -f "$FILE" ] && sed -i 's/kotlin("jvm") version("2.0.21")/kotlin("jvm") version("2.1.20")/' "$FILE" && echo "Patched expo-updates-gradle-plugin"

          # expo-modules-autolinking serialization plugin
          FILE="node_modules/expo-modules-autolinking/android/expo-gradle-plugin/expo-autolinking-plugin-shared/build.gradle.kts"
          [ -f "$FILE" ] && sed -i 's/kotlin("plugin.serialization") version "1.9.24"/kotlin("plugin.serialization") version "2.1.20"/' "$FILE" && echo "Patched expo-autolinking serialization"

      # ── Build local Maven repo for ffmpeg-kit ─────────────────────────
      #
      # arthenica/ffmpeg-kit was retired (June 2025). The original Maven artifact
      # com.arthenica:ffmpeg-kit-https:6.0-2 was never published. We download the
      # API-compatible community fork from Maven Central and serve it under the
      # original coordinates so no JS-side patching is needed.
      #
      - name: Build local ffmpeg-kit Maven repo
        run: |
          DIR="/tmp/ffmpeg-local-maven/com/arthenica/ffmpeg-kit-https/6.0-2"
          mkdir -p "$DIR"
          curl -fSL \
            "https://repo1.maven.org/maven2/io/github/maitrungduc1410/ffmpeg-kit-https/6.0.1/ffmpeg-kit-https-6.0.1.aar" \
            -o "$DIR/ffmpeg-kit-https-6.0-2.aar"
          cat > "$DIR/ffmpeg-kit-https-6.0-2.pom" << 'POMEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.arthenica</groupId>
            <artifactId>ffmpeg-kit-https</artifactId>
            <version>6.0-2</version>
            <packaging>aar</packaging>
            <dependencies>
              <dependency>
                <groupId>com.arthenica</groupId>
                <artifactId>smart-exception-java</artifactId>
                <version>0.2.1</version>
              </dependency>
            </dependencies>
          </project>
          POMEOF
          echo "Local Maven repo ready: $(ls -lh $DIR/*.aar | awk '{print $5, $NF}')"

      # ── Expo prebuild ─────────────────────────────────────────────────
      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      # ── Patch ALL generated Gradle files in one shot ──────────────────
      #
      # expo prebuild generates android/build.gradle and android/app/build.gradle
      # with several issues that must be fixed before Gradle can run:
      #
      #   1. Missing Maven repos for async-storage local_repo and ffmpeg-kit
      #   2. Broken hermesCommand that calls node to resolve 'hermes-compiler'
      #      (doesn't exist in RN 0.79.x — hermesc is bundled in react-native/sdks/)
      #
      # We use a single Python script to patch everything reliably.
      #
      - name: Patch generated Gradle files
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          def patch_file(path, description):
              """Read a file, return its content, and print a header."""
              if not os.path.exists(path):
                  print(f"WARNING: {path} not found — skipping {description}")
                  return None
              with open(path, 'r') as f:
                  return f.read()

          def write_file(path, content):
              with open(path, 'w') as f:
                  f.write(content)

          errors = []

          # ─── 1. android/build.gradle: add custom Maven repositories ───
          path = 'android/build.gradle'
          content = patch_file(path, 'Maven repo injection')
          if content:
              marker = "maven { url 'https://www.jitpack.io' }"
              extra = """
              maven {
                  url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
              }
              maven {
                  url 'file:///tmp/ffmpeg-local-maven'
              }"""
              if marker in content:
                  content = content.replace(marker, marker + extra, 1)
                  write_file(path, content)
                  print(f"OK  {path}: added async-storage + ffmpeg-kit Maven repos")
              else:
                  errors.append(f"{path}: could not find jitpack marker to inject repos")
                  print(f"ERR {path}: jitpack marker not found")

          # ─── 2. android/app/build.gradle: fix broken node .execute() calls ───
          path = 'android/app/build.gradle'
          content = patch_file(path, 'hermesCommand fix')
          if content:
              original = content
              lines = content.split('\n')
              patched_hermes = False
              for i, line in enumerate(lines):
                  # Fix hermesCommand that resolves hermes-compiler via node
                  if 'hermes-compiler' in line and ('hermesCommand' in line or 'hermes' in line.lower()):
                      lines[i] = '    hermesCommand = "$projectRoot/node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"'
                      patched_hermes = True
              content = '\n'.join(lines)

              if patched_hermes:
                  print(f"OK  {path}: replaced hermesCommand with bundled hermesc path")
              else:
                  # Check if hermesCommand exists at all — might already be fine
                  if 'hermesCommand' in content:
                      print(f"INFO {path}: hermesCommand exists but no hermes-compiler reference found (may already be OK)")
                  else:
                      print(f"INFO {path}: no hermesCommand found (RN plugin may handle it)")

              # Diagnostic: show all remaining node .execute() calls
              print(f"\n--- Remaining node .execute() calls in {path} ---")
              for i, line in enumerate(lines, 1):
                  if '.execute(' in line and 'node' in line:
                      print(f"  L{i}: {line.strip()[:120]}")
              print("--- end ---\n")

              write_file(path, content)

          if errors:
              print(f"\nFATAL: {len(errors)} patch(es) failed:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print("\nAll patches applied successfully.")
          PYEOF

      # ── Configure Gradle ──────────────────────────────────────────────
      - name: Configure Gradle
        run: |
          chmod +x android/gradlew

          # Global Gradle properties (affects included builds too)
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          org.gradle.java.installations.fromEnv=JAVA_HOME
          org.gradle.java.installations.auto-download=false
          EOF

          # Project-level properties
          printf '\n' >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "=============================="
            echo "  GRADLE BUILD FAILED"
            echo "=============================="
            echo ""
            echo "--- Key error lines ---"
            grep -n "FAILURE\|What went wrong\|Caused by\|BUILD FAILED\|Execution failed\|Process 'command\|Could not\|error:" gradle-build.log | tail -80 || true
            echo ""
            echo "--- Last 300 lines of build log ---"
            tail -300 gradle-build.log || true
          fi
          exit $BUILD_EXIT
        env:
          JAVA_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m"

      # ── Upload artifacts ──────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SubFlow-APK-${{ github.sha }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            android/gradle-build.log
            android/app/build/reports/
          retention-days: 7
