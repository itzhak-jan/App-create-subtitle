name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "ndk;27.1.12297006" "cmake;3.22.1" "platforms;android-36"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk-bundle \
            /opt/ghc /usr/local/.ghcup || true

      - name: Install JS dependencies
        run: npm ci --legacy-peer-deps

      # ── Patch node_modules for known Kotlin version bugs ──────────────
      #
      # Kotlin 2.0.21 has a "source must not be null" bug with java-gradle-plugin
      # in Gradle 8.8+. All three packages below ship 2.0.21 and must be patched.
      #
      - name: Patch Kotlin versions in Gradle plugins (2.0.21 → 2.1.20)
        run: |
          # @react-native/gradle-plugin
          TOML="node_modules/@react-native/gradle-plugin/gradle/libs.versions.toml"
          if [ -f "$TOML" ]; then
            sed -i 's/^kotlin = "2.0.21"/kotlin = "2.1.20"/' "$TOML"
            find node_modules/@react-native/gradle-plugin -name "build.gradle.kts" \
              -exec sed -i '/^kotlin { jvmToolchain(17) }$/d' {} \;
            echo "Patched @react-native/gradle-plugin"
          fi

          # expo-updates-gradle-plugin
          FILE="node_modules/expo-updates/expo-updates-gradle-plugin/build.gradle.kts"
          [ -f "$FILE" ] && \
            sed -i 's/kotlin("jvm") version("2.0.21")/kotlin("jvm") version("2.1.20")/' "$FILE" && \
            echo "Patched expo-updates-gradle-plugin"

          # expo-modules-autolinking serialization plugin version must match compiler
          FILE="node_modules/expo-modules-autolinking/android/expo-gradle-plugin/expo-autolinking-plugin-shared/build.gradle.kts"
          [ -f "$FILE" ] && \
            sed -i 's/kotlin("plugin.serialization") version "1.9.24"/kotlin("plugin.serialization") version "2.1.20"/' "$FILE" && \
            echo "Patched expo-autolinking serialization"

      # ── Patch react-native-screens codegen type bug ───────────────────
      #
      # react-native-screens 4.24.0 uses namespace-qualified types (CT.WithDefault,
      # CT.Float, CT.DirectEventHandler, etc.) across 14 fabric spec files.
      # The RN 0.79.x codegen TypeScript parser cannot resolve namespace-qualified
      # type references — they resolve to `undefined`, causing:
      #   "Unknown prop type for <name>: undefined"
      #
      # Fix: use a Node.js script to strip the `CT.` prefix from all occurrences
      # across every fabric spec file. The codegen recognizes WithDefault, Float,
      # Int32, Double, DirectEventHandler, etc. by name regardless of import path.
      #
      - name: Patch react-native-screens codegen types
        run: |
          node - <<'PATCH_SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const glob = require('node:fs');

          const fabricDir = 'node_modules/react-native-screens/src/fabric';

          function findFiles(dir) {
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            let files = [];
            for (const e of entries) {
              const full = path.join(dir, e.name);
              if (e.isDirectory()) files = files.concat(findFiles(full));
              else if (e.name.endsWith('.ts') || e.name.endsWith('.tsx')) files.push(full);
            }
            return files;
          }

          const files = findFiles(fabricDir);
          let patched = 0;

          for (const f of files) {
            let src = fs.readFileSync(f, 'utf8');
            if (!src.includes('CT.')) continue;

            // Remove "CodegenTypes as CT, " or ", CodegenTypes as CT" from imports
            let next = src
              .replace(/CodegenTypes as CT,\s*/g, '')
              .replace(/,\s*CodegenTypes as CT/g, '')
              // Strip the CT. namespace prefix from all usages
              .replace(/\bCT\./g, '');

            if (next !== src) {
              fs.writeFileSync(f, next, 'utf8');
              console.log('Patched:', f);
              patched++;
            }
          }

          console.log(`Done — patched ${patched} file(s).`);
          PATCH_SCRIPT

      # ── Patch ReactStylesDiffMapBackingFieldAccessor for RN 0.79 ─────
      #
      # RN 0.79 removed the package-private internal_backingMap() method from
      # ReactStylesDiffMap. expo-modules-core ships an accessor class that calls
      # this method (placed in the same package to access package-private APIs).
      # Fix: rewrite the accessor to use reflection to read the private mBackingMap
      # field directly, which still exists in RN 0.79.
      #
      - name: Patch ReactStylesDiffMapBackingFieldAccessor for RN 0.79
        run: |
          FILE="node_modules/expo-modules-core/android/src/main/java/com/facebook/react/uimanager/ReactStylesDiffMapBackingFieldAccessor.java"
          if [ -f "$FILE" ]; then
            cat > "$FILE" << 'JAVAEOF'
package com.facebook.react.uimanager;

import com.facebook.react.bridge.ReadableMap;
import java.lang.reflect.Field;

public class ReactStylesDiffMapBackingFieldAccessor {
  static ReadableMap getBackingMap(ReactStylesDiffMap diffMap) {
    try {
      Field f = ReactStylesDiffMap.class.getDeclaredField("mBackingMap");
      f.setAccessible(true);
      return (ReadableMap) f.get(diffMap);
    } catch (Exception e) {
      throw new RuntimeException("Cannot access ReactStylesDiffMap.mBackingMap", e);
    }
  }
}
JAVAEOF
            echo "Patched $FILE"
          else
            echo "File not found, skipping patch"
          fi

      # ── Build local Maven repo for ffmpeg-kit ─────────────────────────
      #
      # arthenica/ffmpeg-kit was retired June 2025. The Maven artifact
      # com.arthenica:ffmpeg-kit-https:6.0-2 was never published to Maven Central.
      # Download the API-compatible community fork and serve it under the
      # original coordinates so no JS-side patching is needed.
      #
      - name: Build local ffmpeg-kit Maven repo
        run: |
          DIR="/tmp/ffmpeg-local-maven/com/arthenica/ffmpeg-kit-https/6.0-2"
          mkdir -p "$DIR"
          curl -fSL \
            "https://repo1.maven.org/maven2/io/github/maitrungduc1410/ffmpeg-kit-https/6.0.1/ffmpeg-kit-https-6.0.1.aar" \
            -o "$DIR/ffmpeg-kit-https-6.0-2.aar"
          cat > "$DIR/ffmpeg-kit-https-6.0-2.pom" << 'POMEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.arthenica</groupId>
            <artifactId>ffmpeg-kit-https</artifactId>
            <version>6.0-2</version>
            <packaging>aar</packaging>
            <dependencies>
              <dependency>
                <groupId>com.arthenica</groupId>
                <artifactId>smart-exception-java</artifactId>
                <version>0.2.1</version>
              </dependency>
            </dependencies>
          </project>
          POMEOF
          echo "ffmpeg-kit local Maven ready: $(ls -lh $DIR | awk 'NR>1{print $5, $NF}')"

      # ── Expo prebuild ─────────────────────────────────────────────────
      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      # ── Patch all generated Gradle files ─────────────────────────────
      #
      # expo prebuild generates android/build.gradle and android/app/build.gradle
      # with issues that must be fixed before Gradle can run:
      #
      #   1. android/build.gradle — Missing Maven repos:
      #      - async-storage ships its own local_repo with storage-android artifact
      #      - ffmpeg-kit needs our custom local Maven repo (arthenica retired)
      #
      #   2. android/app/build.gradle — Broken hermesCommand:
      #      Generated code calls node to resolve 'hermes-compiler/package.json',
      #      which doesn't exist in React Native 0.79.x. hermesc is bundled directly
      #      in node_modules/react-native/sdks/hermesc/<OS-BIN>/.
      #
      - name: Patch generated Gradle files
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          def read(path):
              if not os.path.exists(path):
                  print(f"WARNING: {path} not found — skipping")
                  return None
              with open(path, 'r') as f:
                  return f.read()

          def write(path, content):
              with open(path, 'w') as f:
                  f.write(content)

          errors = []

          # 1. android/build.gradle — inject custom Maven repositories
          path = 'android/build.gradle'
          content = read(path)
          if content:
              marker = "maven { url 'https://www.jitpack.io' }"
              extra = """
              maven {
                  url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
              }
              maven {
                  url 'file:///tmp/ffmpeg-local-maven'
              }"""
              if marker in content:
                  write(path, content.replace(marker, marker + extra, 1))
                  print(f"OK  {path}: injected Maven repos")
              else:
                  errors.append(f"{path}: jitpack marker not found")

          # 2. android/build.gradle — inject resolution strategy to force compatible
          #    androidx versions.
          #
          # androidx.core:1.17.0 and androidx.activity:1.11.0 (transitive deps of
          # some RN packages) embed AAR metadata requiring compileSdk >= 36 and
          # AGP >= 8.9.1. Rather than bumping those (which is fragile because expo
          # prebuild writes them in an unpredictable format), we force-pin to the
          # last releases that carry no such constraints.
          #
          path = 'android/build.gradle'
          content = read(path)
          if content:
              # Print first 30 lines so we can see the exact generated format in logs
              print(f"--- First 30 lines of {path} ---")
              for i, l in enumerate(content.split('\n')[:30], 1):
                  print(f"  {i:3}: {l}")
              print(f"--- end ---")

              resolution_block = (
                  '\n'
                  '// CI: force-pin androidx to versions with no compileSdk/AGP constraints\n'
                  'allprojects {\n'
                  '    configurations.all {\n'
                  '        resolutionStrategy {\n'
                  "            force 'androidx.core:core:1.15.0'\n"
                  "            force 'androidx.core:core-ktx:1.15.0'\n"
                  "            force 'androidx.activity:activity:1.9.3'\n"
                  "            force 'androidx.activity:activity-ktx:1.9.3'\n"
                  '        }\n'
                  '    }\n'
                  '}\n'
              )
              write(path, content + resolution_block)
              print(f"OK  {path}: injected androidx resolution strategy")

          # 3. android/app/build.gradle — fix broken hermesCommand
          path = 'android/app/build.gradle'
          content = read(path)
          if content:
              lines = content.split('\n')
              patched = False
              for i, line in enumerate(lines):
                  if 'hermes-compiler' in line:
                      lines[i] = '    hermesCommand = "$projectRoot/node_modules/react-native/sdks/hermesc/%OS-BIN%/hermesc"'
                      patched = True
                      print(f"OK  {path}: replaced hermesCommand (line {i+1})")
              if not patched:
                  if 'hermesCommand' in content:
                      print(f"INFO {path}: hermesCommand found but no hermes-compiler reference (may be OK)")
                  else:
                      print(f"INFO {path}: no hermesCommand found (may be handled by RN plugin)")
              write(path, '\n'.join(lines))

              # Diagnostic: show remaining node .execute() calls
              remaining = [(i+1, l.strip()) for i, l in enumerate(lines) if '.execute(' in l and 'node' in l]
              if remaining:
                  print(f"\n  Remaining node .execute() calls in {path}:")
                  for lineno, line in remaining:
                      print(f"    L{lineno}: {line[:120]}")

          if errors:
              for e in errors: print(f"FATAL: {e}")
              sys.exit(1)

          print("\nAll patches applied.")
          PYEOF

      # ── Configure Gradle ──────────────────────────────────────────────
      - name: Configure Gradle
        run: |
          chmod +x android/gradlew

          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          org.gradle.java.installations.fromEnv=JAVA_HOME
          org.gradle.java.installations.auto-download=false
          EOF

          printf '\n' >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo ""
            echo "=============================="
            echo "  GRADLE BUILD FAILED"
            echo "=============================="
            echo ""
            echo "--- Key error lines ---"
            grep -n "FAILURE\|What went wrong\|Caused by\|BUILD FAILED\|Execution failed\|Process 'command\|Could not\|error:" \
              gradle-build.log | tail -80 || true
            echo ""
            echo "--- Last 300 lines of build log ---"
            tail -300 gradle-build.log || true
          fi
          exit $BUILD_EXIT
        env:
          JAVA_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m"

      # ── Artifacts ─────────────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SubFlow-APK-${{ github.sha }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            android/gradle-build.log
            android/app/build/reports/
          retention-days: 7
