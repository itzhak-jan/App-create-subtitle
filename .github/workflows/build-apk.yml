name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    # For PRs, only run if merged
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configure global Gradle properties
        run: |
          mkdir -p ~/.gradle
          # Apply to ALL Gradle builds globally, including @react-native/gradle-plugin included build
          # This is the only way to affect included builds' Kotlin compilation strategy
          cat >> ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8
          kotlin.compiler.execution.strategy=in-process
          org.gradle.java.installations.fromEnv=JAVA_HOME
          org.gradle.java.installations.auto-download=false
          EOF

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk-bundle \
            /opt/ghc /usr/local/.ghcup || true
          df -h

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.1.12297006" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli eas-cli

      - name: Run type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run linter
        run: npx eslint src --ext .ts,.tsx --max-warnings 50
        continue-on-error: true

      - name: Generate native Android project (prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Configure Gradle properties for CI
        run: |
          # Help Gradle find JDK 17 toolchain via JAVA_HOME (needed by @react-native/gradle-plugin jvmToolchain(17))
          echo "org.gradle.java.installations.fromEnv=JAVA_HOME" >> android/gradle.properties
          # Disable auto-download to prevent Gradle from trying to fetch JDK from internet
          echo "org.gradle.java.installations.auto-download=false" >> android/gradle.properties
          # Set JVM args for Gradle — large heap for Kotlin compilation
          echo "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -Dfile.encoding=UTF-8" >> android/gradle.properties
          # Force Kotlin compiler to run in-process (same JVM as Gradle) instead of a separate worker
          # This prevents "Internal compiler error" OOM crashes in Kotlin worker processes
          echo "kotlin.compiler.execution.strategy=in-process" >> android/gradle.properties

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle-build.log; BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Gradle build failed. Full error section:"
            # Extract from FAILURE block to end of file (up to 150 lines)
            grep -n "FAILURE\|What went wrong\|Caused by\|compileKotlin\|BUILD FAILED" gradle-build.log | tail -30 || true
            echo "--- Last 80 lines of build log ---"
            tail -80 gradle-build.log || true
          fi
          exit $BUILD_EXIT
        env:
          JAVA_OPTS: "-Xmx6144m -XX:MaxMetaspaceSize=2048m"

      - name: Sign APK (debug keystore for CI)
        working-directory: android
        run: |
          # Generate a debug keystore if signing is needed
          if [ ! -f "app/release.keystore" ]; then
            keytool -genkey -v \
              -keystore app/release.keystore \
              -alias subflow \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=SubFlow, OU=Dev, O=SubFlow, L=Israel, S=Israel, C=IL" \
              -storepass subflow123 \
              -keypass subflow123 2>/dev/null || true
          fi

      - name: Get APK path
        id: apk_path
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SubFlow-APK-${{ github.sha }}
          path: ${{ steps.apk_path.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            android/gradle-build.log
            android/app/build/reports/
          retention-days: 7

