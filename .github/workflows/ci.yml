name: CI - Type Check & Lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  type-check-and-lint:
    name: TypeScript & ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --format compact
